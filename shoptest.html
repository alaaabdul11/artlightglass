<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtLightGlass Shop</title>
<style>
  body { font-family: Arial, sans-serif; background: #fffdf8; margin: 0; }
  header { text-align: center; padding: 20px; background: #fff; border-bottom: 1px solid #eee; }
  h1 { color: #b96b3f; }
  .shop { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; padding: 30px; }
  .product { width: 300px; border: 1px solid #eee; border-radius: 10px; background: #fff; text-align: center; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .product img { width: 100%; border-radius: 10px; }
  .product h2 { color: #b96b3f; font-size: 1.2em; }
  .price { font-size: 1.1em; margin: 10px 0; color: #333; }
  button { background: #b96b3f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
  button:hover { background: #a35830; }
  #cart { max-width: 800px; margin: 40px auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
  #paypal-button-container { margin-top: 20px; }
</style>
</head>
<body>

<header>
  <h1>ArtLightGlass Shop</h1>
  <p>Hand-painted glass candle holders — buy directly from the artist</p>
</header>

<section class="shop">
  <div class="product">
    <img src="images/DRAGONFLY.png" alt="Dragonfly Candle Holder">
    <h2>Dragonfly Candle Holder</h2>
    <p class="price">$25.00</p>
    <button onclick="addToCart('Dragonfly Candle Holder', 25)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="images/rose.jpg" alt="Rose Garden Candle Holder">
    <h2>Rose Garden Candle Holder</h2>
    <p class="price">$30.00</p>
    <button onclick="addToCart('Rose Garden Candle Holder', 30)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="images/restaurant.jpg" alt="Restaurant Candle Holder">
    <h2>Restaurant Candle Holder</h2>
    <p class="price">$28.00</p>
    <button onclick="addToCart('Restaurant Candle Holder', 28)">Add to Cart</button>
  </div>
</section>

<section id="cart">
  <h2>Your Cart</h2>
  <table id="cartTable">
    <tr>
      <th>Item</th>
      <th>Price</th>
      <th>Quantity</th>
      <th>Total</th>
      <th>Remove</th>
    </tr>
  </table>
  <h3 id="cartTotal">Total: $0</h3>
  <div id="paypal-button-container"></div>
</section>

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>
<script>
  (function() {
    emailjs.init("YOUR_EMAILJS_PUBLIC_KEY"); // Replace with your EmailJS Public Key
  })();
</script>

<script>
let cart = [];

function addToCart(name, price) {
  let product = cart.find(item => item.name === name);
  if (product) {
    product.quantity++;
  } else {
    cart.push({ name, price, quantity: 1 });
  }
  renderCart();
}

function removeFromCart(name) {
  cart = cart.filter(item => item.name !== name);
  renderCart();
}

function updateQuantity(name, qty) {
  let product = cart.find(item => item.name === name);
  if (product) {
    product.quantity = parseInt(qty) || 1;
  }
  renderCart();
}

function renderCart() {
  const table = document.getElementById('cartTable');
  table.innerHTML = `
    <tr>
      <th>Item</th>
      <th>Price</th>
      <th>Quantity</th>
      <th>Total</th>
      <th>Remove</th>
    </tr>
  `;
  let total = 0;
  cart.forEach(item => {
    total += item.price * item.quantity;
    table.innerHTML += `
      <tr>
        <td>${item.name}</td>
        <td>$${item.price}</td>
        <td><input type="number" value="${item.quantity}" min="1" onchange="updateQuantity('${item.name}', this.value)"></td>
        <td>$${(item.price * item.quantity).toFixed(2)}</td>
        <td><button onclick="removeFromCart('${item.name}')">X</button></td>
      </tr>
    `;
  });
  document.getElementById('cartTotal').textContent = `Total: $${total.toFixed(2)}`;

  // PayPal button
  paypal.Buttons({
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{
          amount: { value: total.toFixed(2) }
        }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert('Thank you ' + details.payer.name.given_name + '! Your order is placed.');
        
        // Send email via EmailJS
        const orderDetails = cart.map(item => `${item.quantity} x ${item.name} ($${item.price})`).join("\n");
        emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
          customer_name: details.payer.name.given_name + " " + details.payer.name.surname,
          customer_email: details.payer.email_address,
          order_items: orderDetails,
          order_total: "$" + total.toFixed(2)
        }).then(function(response) {
          console.log("Email sent successfully", response);
        }, function(error) {
          console.error("Email sending failed", error);
        });

        cart = [];
        renderCart();
      });
    }
  }).render('#paypal-button-container');
}
</script>

</body>
</html>
